<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sunanda Birthday</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
overflow:hidden;
}

/* LOCK SCREEN */
#lockScreen{
position:fixed;
width:100%;
height:100%;
background:#1e1e2f;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
z-index:1000;
}

#lockScreen h1{
font-family:'Great Vibes',cursive;
font-size:45px;
margin-bottom:20px;
}

input{
padding:12px;
border-radius:25px;
border:none;
font-size:18px;
text-align:center;
}

button{
margin-top:15px;
padding:10px 25px;
border-radius:25px;
border:none;
background:#ff4d6d;
color:white;
font-size:16px;
cursor:pointer;
}

/* TIMER */
#timer{
display:none;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:80px;
color:white;
font-weight:bold;
}

/* BOOK */
#book{
display:none;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:300px;
height:400px;
perspective:1500px;
}

/* PAGE */
.page{
position:absolute;
width:100%;
height:100%;
background:white;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
backface-visibility:hidden;
transform-origin:left;
transition:transform 1s ease;
}

/* STACK ORDER */
#page0{ z-index:4; }
#page1{ z-index:3; }
#page2{ z-index:2; }
#page3{ z-index:1; }

.page h1{
font-family:'Great Vibes',cursive;
font-size:38px;
color:#ff4d6d;
}

.page p{
font-size:16px;
}

.flipped{
transform:rotateY(-180deg);
}
</style>
</head>

<body>

<div id="lockScreen">
<h1>Only For Sunanda ❤️</h1>
<input type="password" id="password" placeholder="Enter Password">
<button onclick="unlock()">Unlock</button>
</div>

<div id="timer">5</div>

<div id="book">

<div class="page" id="page0">
<h1>🌷 Sunanda 🌷</h1>
<p>Tap below to open your birthday diary</p>
<button onclick="flipPage(0)">Open</button>
</div>

<div class="page" id="page1">
<h1>Happy Birthday 🎉</h1>
<p>You make my world brighter every day.</p>
<button onclick="flipPage(1)">Next</button>
</div>

<div class="page" id="page2">
<h1>My Peace 💕</h1>
<p>My favorite peace is falling asleep knowing you're mine and waking up loving you more.</p>
<button onclick="flipPage(2)">Next</button>
</div>

<div class="page" id="page3">
<h1>Forever ❤️</h1>
<p>I Love You So Much Sunanda.</p>
</div>

</div>

<script>
function unlock(){
var pass=document.getElementById("password").value;

if(pass==="Tushar77"){
document.getElementById("lockScreen").style.display="none";
startTimer();
}else{
alert("Wrong Password");
}
}

function startTimer(){
var time=5;
var timer=document.getElementById("timer");
timer.style.display="block";
timer.innerText=time;

var count=setInterval(function(){
time--;
timer.innerText=time;

if(time<=0){
clearInterval(count);
timer.style.display="none";
document.getElementById("book").style.display="block";
}
},1000);
}

function flipPage(num){
document.getElementById("page"+num).classList.add("flipped");
}
</script>

</body>
</html>
